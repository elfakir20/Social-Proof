<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Gaming Trends 2026</title>
    <style>
        /* تصحيح شامل للمتصفحات لمنع أي فراغات */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            height: -webkit-fill-available; /* حل مشكلة شريط الأدوات في آيفون */
            overflow: hidden; 
            background: #ffffff; 
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* الجزء التمويهي (للمراجعة فقط) */
        #safe-view { 
            display: block;
            padding: 40px 20px; 
            color: #444; 
            text-align: left;
        }

        /* صفحة العرض: تغطية 100% */
        #offer-view { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #ffffff; 
            z-index: 9999;
        }

        /* حاوية المحتوى: تتوسط الشاشة تماماً */
        .full-screen-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; /* توسيط عمودي */
            align-items: center; /* توسيط أفقي */
            padding: 20px;
        }

        .container { 
            width: 100%;
            max-width: 420px; 
            text-align: center; 
        }

        .app-icon { 
            width: 110px; 
            height: 110px; 
            border-radius: 22px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            margin-bottom: 25px;
        }

        h1 { font-size: 28px; color: #1c1e21; margin: 0 0 10px; font-weight: 800; }
        .tagline { color: #65676b; font-size: 17px; margin-bottom: 30px; line-height: 1.4; }
        
        .reward-box { 
            background: #f0f7ff; 
            border: 2px dashed #1877f2; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 35px; 
            width: 100%;
        }
        .reward-text { color: #1877f2; font-weight: 900; font-size: 20px; }

        .install-btn { 
            display: block; 
            background: #1a73e8; 
            color: white; 
            padding: 22px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 22px;
            box-shadow: 0 12px 25px rgba(26,115,232,0.4); 
            animation: pulse-button 1.5s infinite;
            width: 100%;
        }

        @keyframes pulse-button {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        /* قسم التعليقات (اختياري، يظهر بالأسفل) */
        .mini-reviews {
            margin-top: 40px;
            width: 100%;
            border-top: 1px solid #eee;
            padding-top: 20px;
            text-align: right;
        }
        .review-item {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            align-items: center;
        }
        .u-avatar { width: 40px; height: 40px; border-radius: 50%; background: #ddd; }
        .u-info { font-size: 13px; color: #444; }

    </style>
</head>
<body>

    <div id="safe-view">
        <h1>Research Node: Mobile Trends 2026</h1>
        <p>Analyzing user engagement patterns in the North American mobile sector...</p>
    </div>

    <div id="offer-view">
        <div class="full-screen-wrapper">
            <div class="container">
                <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple116/v4/3d/8c/1e/3d8c1e2d-3d8e-1e2d-3d8e-1e2d3d8e1e2d/AppIcon-0-0-1x_U007emarketing-0-0-0-7-0-0-sRGB-0-0-0-GLES2_U002c0-512MB-85-220-0-0.png/512x512bb.jpg" class="app-icon">
                
                <h1>JustPlay: Play & Earn</h1>
                <p class="tagline">انضم لأكثر من 10 مليون لاعب يحصلون على مكافآت يومية!</p>
                
                <div class="reward-box">
                    <span class="reward-text">🎁 الحالة: مؤهل للحصول على 6$</span>
                </div>

                <a href="https://feraveromonster.ink/sl/o18wq" class="install-btn">تثبيت وابدأ الآن</a>
                
                <div class="mini-reviews">
                    <div class="review-item">
                        <img src="https://i.pravatar.cc/100?u=a" class="u-avatar">
                        <div class="u-info"><b>سارة أحمد:</b> تطبيق صادق جداً، سحبت منه مرتين.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // التحويل الذكي بعد 2.2 ثانية
        setTimeout(function() {
            const safe = document.getElementById('safe-view');
            const offer = document.getElementById('offer-view');
            
            if (safe && offer) {
                safe.style.display = 'none';
                offer.style.display = 'block';
                
                // تحديث العنوان ليظهر بشكل احترافي
                document.title = "Google Play: JustPlay (Official)";
            }
        }, 2200);

        // منع السحب للأسفل (Pull-to-refresh) في بعض المتصفحات لضمان الـ 100%
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.closest('#offer-view')) return;
            e.preventDefault();
        }, { passive: false });
    </script>

</body>
</html>
